{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-7">
        <div class="card glass-card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="bg-light rounded-circle d-inline-block p-4 mb-3 shadow-sm">
                        <i class="fas fa-cloud-upload-alt fa-4x text-primary"></i>
                    </div>
                    <h2 class="fw-bold">Upload Your Resume</h2>
                    <p class="text-muted">Our AI system will parse your document to calculate your match score for all open positions!</p>
                </div>
                
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="formFileLg" class="form-label fw-bold">Select PDF Document</label>
                        <input class="form-control form-control-lg border-primary text-primary" type="file" name="file" id="formFileLg" accept=".pdf" required>
                        <div class="form-text mt-2"><i class="fas fa-info-circle text-info"></i> Please upload PDF format only for accurate parsing.</div>
                    </div>
                    
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold"><i class="fas fa-upload"></i> Upload & Process</button>
                    </div>
                </form>
                
                <div class="text-center mt-4">
                    <a href="{% url 'resumes:candidate_dashboard' %}" class="text-secondary text-decoration-none"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
